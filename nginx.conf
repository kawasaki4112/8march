# HTTP → HTTPS редирект
server {
    listen 80;
    listen [::]:80;
    server_name 8march.kawasaki4112.dev;
    return 301 https://$host$request_uri;
}

# HTTPS
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name 8march.kawasaki4112.dev;

    # SSL (certbot сгенерирует)
    ssl_certificate     /etc/letsencrypt/live/8march.kawasaki4112.dev/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/8march.kawasaki4112.dev/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers 'ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384';
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;

    # Безопасность
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-XSS-Protection "1; mode=block" always;

    # Корень — куда rsync кладёт билд
    root /8march/web;
    index index.html;

    # Vue Router (SPA) — всё fallback на index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Кеширование статики (Vite генерирует файлы с хешами в /assets/)
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # gzip
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript image/svg+xml;
    gzip_min_length 256;
    gzip_vary on;

    # Логи
    access_log /var/log/nginx/8march.access.log;
    error_log  /var/log/nginx/8march.error.log;
}